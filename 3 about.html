<!-- Sub-Style for milestone markers and UI -->
<style data-purpose="ui-layout">
    .milestone-marker {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .info-panel {
      position: fixed;
      top: 50%;
      right: 10%;
      transform: translateY(-50%) translateX(100px);
      width: 400px;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(20px);
      border-left: 1px solid #00FFFF;
      padding: 2.5rem;
      opacity: 0;
      transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      pointer-events: auto;
    }
    .info-panel.active {
      opacity: 1;
      transform: translateY(-50%) translateX(0);
    }
    .energy-seam {
      position: absolute;
      top: 0;
      left: 0;
      width: 1px;
      height: 100%;
      background: linear-gradient(to bottom, transparent, #00FFFF, transparent);
      box-shadow: 0 0 15px #00FFFF;
    }
</style>
</head>
<body>
<!-- BEGIN: UI Layer -->
<div class="overlay-container">
<!-- Header Interface -->
<header class="fixed top-0 left-0 w-full p-8 flex justify-between items-start z-50 mix-blend-difference pointer-events-auto">
<div data-purpose="logo-area">
<h1 class="text-sm tracking-[0.5em] font-light text-white uppercase">Nexus System v3.0 | Cybernetic Milestones</h1>
<div class="w-12 h-px bg-cyan-400 mt-2"></div>
</div>
<div class="text-right">
<p class="text-[10px] font-mono text-cyan-400" id="scroll-percentage">SYNC_STATUS: 0%</p>
</div>
</header>
<!-- Scroll Markers for GSAP -->
<section class="milestone-marker" data-milestone="0"></section>
<section class="milestone-marker" data-milestone="1"></section>
<section class="milestone-marker" data-milestone="2"></section>
<section class="milestone-marker" data-milestone="3"></section>
<section class="milestone-marker" data-milestone="4"></section>
<section class="milestone-marker" data-milestone="5"></section>
<section class="milestone-marker" data-milestone="6"></section>
<section class="milestone-marker" data-milestone="7"></section>
<!-- Information Panel -->
<div class="info-panel" id="infoPanel">
<div class="energy-seam"></div>
<span class="text-[10px] font-mono text-cyan-400 mb-2 block tracking-widest uppercase" id="panel-date">Phase // 2024</span>
<h2 class="text-3xl font-light text-white mb-4 tracking-tight" id="panel-title">System Evolution</h2>
<p class="text-silver-400 text-sm leading-relaxed mb-6 opacity-80" id="panel-desc">
        Integrating technical complexity with ultra-premium aesthetic frameworks. A cybernetic interface designed for the next generation of narrative web experiences.
      </p>
<button class="px-6 py-2 border border-white/20 text-white text-[10px] tracking-widest uppercase hover:bg-white hover:text-black transition-colors duration-300">
        Analyze Data
      </button>
</div>
<!-- Navigation Dots -->
<nav class="fixed left-8 top-1/2 -translate-y-1/2 flex flex-col gap-4 z-50 pointer-events-auto">
<div class="w-1 h-1 bg-cyan-400 rounded-full"></div>
<div class="w-1 h-1 bg-white/20 rounded-full"></div>
<div class="w-1 h-1 bg-white/20 rounded-full"></div>
<div class="w-1 h-1 bg-white/20 rounded-full"></div>
</nav>
</div>
<!-- END: UI Layer -->
<!-- BEGIN: WebGL Container -->
<canvas id="canvas-container-milestones"></canvas>
<!-- END: WebGL Container -->
<!-- BEGIN: Three.js Experience Script -->
<script data-purpose="three-js-logic">
window.onerror = function(msg, url, lineNo, columnNo, error) {
    const errDiv = document.createElement('div');
    errDiv.style.cssText = 'position:fixed;top:0;left:0;z-index:99999;background:red;color:white;padding:20px;font-family:monospace;font-size:14px;';
    errDiv.innerText = 'Milestone JS Error: ' + msg + ' at line ' + lineNo;
    document.body.appendChild(errDiv);
    return false;
};
(function() {
    gsap.registerPlugin(ScrollTrigger);

    // Initialization Variables
    const canvasMilestones = document.querySelector('#canvas-container-milestones');
    if (!canvasMilestones) return;
    const renderer = new THREE.WebGLRenderer({ canvas: canvasMilestones, antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000000, 0.05);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 10;

    // Lighting
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const mainLight = new THREE.PointLight(0x00FFFF, 2, 50);
    mainLight.position.set(10, 10, 10);
    scene.add(mainLight);

    const blueLight = new THREE.PointLight(0x0066FF, 1, 50);
    blueLight.position.set(-10, -10, 5);
    scene.add(blueLight);

    // Neural Network Mesh
    const networkCount = 40;
    const networkPoints = [];
    const networkGeometry = new THREE.BufferGeometry();
    const networkPositions = new Float32Array(networkCount * 3);
    
    for(let i=0; i < networkCount; i++) {
      const x = (Math.random() - 0.5) * 30;
      const y = (Math.random() - 0.5) * 20;
      const z = (Math.random() - 0.5) * 60 - 20;
      networkPositions[i*3] = x;
      networkPositions[i*3+1] = y;
      networkPositions[i*3+2] = z;
      networkPoints.push(new THREE.Vector3(x, y, z));
    }
    
    networkGeometry.setAttribute('position', new THREE.BufferAttribute(networkPositions, 3));
    
    // Glowing Nodes
    const nodeGeometry = new THREE.SphereGeometry(0.15, 16, 16);
    const nodeMaterial = new THREE.MeshBasicMaterial({ color: 0x00FFFF });
    const nodesGroup = new THREE.Group();
    
    networkPoints.forEach(pos => {
      const node = new THREE.Mesh(nodeGeometry, nodeMaterial);
      node.position.copy(pos);
      nodesGroup.add(node);
    });
    scene.add(nodesGroup);

    // Connecting Lines (Mesh)
    const lineMaterial = new THREE.LineBasicMaterial({ color: 0x00FFFF, transparent: true, opacity: 0.2 });
    const linesGroup = new THREE.Group();
    
    for(let i=0; i < networkCount; i++) {
      for(let j=i+1; j < networkCount; j++) {
        const dist = networkPoints[i].distanceTo(networkPoints[j]);
        if(dist < 12) {
          const lineGeom = new THREE.BufferGeometry().setFromPoints([networkPoints[i], networkPoints[j]]);
          const line = new THREE.Line(lineGeom, lineMaterial);
          linesGroup.add(line);
        }
      }
    }
    scene.add(linesGroup);

    // Atmospheric Dust
    const particleCount = 2500;
    const particles = new THREE.BufferGeometry();
    const posArr = new Float32Array(particleCount * 3);
    for(let i=0; i < particleCount * 3; i++) {
      posArr[i] = (Math.random() - 0.5) * 100;
    }
    particles.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
    const particleMaterial = new THREE.PointsMaterial({ size: 0.05, color: 0x00FFFF, transparent: true, opacity: 0.4, blending: THREE.AdditiveBlending });
    const particleMesh = new THREE.Points(particles, particleMaterial);
    scene.add(particleMesh);

    // Milestone Data
    const milestoneData = [
      { title: "Holographic Browser", date: "Q1 2024", type: "browser", desc: "Revolutionary interface for cross-dimensional data viewing." },
      { title: "Glass Monolith", date: "Q2 2024", type: "monolith", desc: "Physical computing at an architectural scale." },
      { title: "Rotating Ring", date: "Q3 2024", type: "ring", desc: "Cyclic energy distribution and storage network." },
      { title: "Product Cube", date: "Q4 2024", type: "cube", desc: "Encapsulated intelligence modules for edge processing." },
      { title: "Scanning Disc", date: "Q1 2025", type: "disc", desc: "High-frequency environmental scanning and analysis." },
      { title: "Notification Sphere", date: "Q2 2025", type: "sphere", desc: "Global telemetry feedback and alerting system." },
      { title: "Cinematic Slab", date: "Q3 2025", type: "slab", desc: "Narrative-driven visual computing surfaces." },
      { title: "Signature Artifact", date: "Q4 2025", type: "artifact", desc: "The pinnacle of cybernetic system design." }
    ];

    const objects = [];
    const createObject = (index) => {
      const group = new THREE.Group();
      let geometry;

      const glassMat = new THREE.MeshPhysicalMaterial({
        color: 0x00ffff,
        metalness: 0.9,
        roughness: 0.1,
        transmission: 0.5,
        ior: 1.5,
        transparent: true,
        opacity: 0.6,
        side: THREE.DoubleSide,
        emissive: 0x00ffff,
        emissiveIntensity: 0.2
      });

      const wireframeMat = new THREE.MeshBasicMaterial({
        color: 0x00FFFF,
        wireframe: true,
        transparent: true,
        opacity: 0.8
      });

      switch(index) {
        case 0: geometry = new THREE.PlaneGeometry(4, 2.4); break;
        case 1: geometry = new THREE.BoxGeometry(1.6, 5.0, 1.6); break;
        case 2: geometry = new THREE.TorusGeometry(2, 0.1, 16, 100); break;
        case 3: geometry = new THREE.BoxGeometry(2.4, 2.4, 2.4); break;
        case 4: geometry = new THREE.CylinderGeometry(3, 3, 0.1, 64); break;
        case 5: geometry = new THREE.SphereGeometry(2, 32, 32); break;
        case 6: geometry = new THREE.BoxGeometry(4, 2.4, 0.2); break;
        default: geometry = new THREE.IcosahedronGeometry(2.4, 0); break;
      }

      const mesh = new THREE.Mesh(geometry, glassMat);
      const wire = new THREE.Mesh(geometry, wireframeMat);
      group.add(mesh, wire);

      group.position.z = -index * 25;
      group.position.x = (Math.random() - 0.5) * 8;
      group.position.y = (Math.random() - 0.5) * 4;
      
      scene.add(group);
      objects.push({ group, data: milestoneData[index], index });
    };

    for(let i=0; i<8; i++) createObject(i);

    // Scroll Logic
    const milestoneContainer = document.getElementById('milestone-container');
    const infoPanel = document.getElementById('infoPanel');
    const pTitle = document.getElementById('panel-title');
    const pDate = document.getElementById('panel-date');
    const pDesc = document.getElementById('panel-desc');

    const handleScrollMilestones = () => {
      if (!milestoneContainer) return;
      const rect = milestoneContainer.getBoundingClientRect();
      const winHeight = window.innerHeight;

      // Visibility Toggle
      if (rect.top < winHeight && rect.bottom > 0) {
        milestoneContainer.classList.add('active');
        
        // Progress within the container (0 to 1)
        const totalScrollable = rect.height - winHeight;
        let progress = 0;
        if (totalScrollable > 0) {
            progress = -rect.top / totalScrollable;
        } else {
            // Fallback for smaller containers or edge cases
            progress = Math.abs(rect.top) / rect.height;
        }
        progress = Math.max(0, Math.min(1, progress));
        
        const statusEl = document.getElementById('scroll-percentage');
        if (statusEl) statusEl.innerText = `SYNC_STATUS: ${Math.round(progress * 100)}%`;

        // Camera forward movement with depth
        gsap.to(camera.position, {
          z: 10 - (progress * 200),
          duration: 1.5,
          ease: "power2.out"
        });

        const currentMilestoneIndex = Math.floor(progress * 7.99); // scale to 0-7
        if (progress > 0.05 && progress < 0.95) {
          if (pTitle) pTitle.innerText = milestoneData[currentMilestoneIndex].title;
          if (pDate) pDate.innerText = milestoneData[currentMilestoneIndex].date;
          if (pDesc) pDesc.innerText = milestoneData[currentMilestoneIndex].desc;
          if (infoPanel) infoPanel.classList.add('active');
        } else {
          if (infoPanel) infoPanel.classList.remove('active');
        }
        
        // Force Canvas Opacity explicitly
        if (canvasMilestones) canvasMilestones.style.opacity = '1';
      } else {
        milestoneContainer.classList.remove('active');
        if (canvasMilestones) canvasMilestones.style.opacity = '0';
      }
    };
    
    // Initial check
    handleScrollMilestones(); 

    // Custom Cursor
    const cursor = document.getElementById('cursor');
    window.addEventListener('mousemove', (e) => {
      if (!cursor) return;
      gsap.to(cursor, {
        x: e.clientX - 10,
        y: e.clientY - 10,
        duration: 0.1
      });
      
      // Dynamic camera drift based on mouse (only if active)
      if (milestoneContainer && milestoneContainer.classList.contains('active')) {
        const mouseX = (e.clientX / window.innerWidth) - 0.5;
        const mouseY = (e.clientY / window.innerHeight) - 0.5;
        gsap.to(camera.rotation, {
          y: -mouseX * 0.1,
          x: -mouseY * 0.1,
          duration: 2
        });
      }
    });

    // Animation Loop
    function animate() {
      requestAnimationFrame(animate);
      const time = Date.now() * 0.001;
      
      handleScrollMilestones();
      
      // Rotate Network Mesh
      nodesGroup.rotation.y += 0.001;
      linesGroup.rotation.y += 0.001;
      nodesGroup.rotation.z += 0.0005;
      linesGroup.rotation.z += 0.0005;

      // Pulse Nodes
      nodesGroup.children.forEach((node, i) => {
        const pulse = 1 + Math.sin(time * 2 + i) * 0.2;
        node.scale.set(pulse, pulse, pulse);
      });

      objects.forEach(obj => {
        obj.group.rotation.y += 0.008;
        obj.group.rotation.x += 0.003;
        obj.group.position.y += Math.sin(time + obj.index) * 0.005;
      });

      particleMesh.rotation.y += 0.001;
      particleMesh.rotation.x += 0.0005;
      
      // Atmospheric cinematic drift
      camera.position.x += Math.sin(time * 0.5) * 0.002;
      camera.position.y += Math.cos(time * 0.3) * 0.002;

      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
})();
</script>
<!-- END: Three.js Experience Script -->
</body></html>
