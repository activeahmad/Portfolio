<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Live System Activity - Developer Portfolio</title>
<!-- Tailwind CSS v3 with plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts for Monospace -->
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&amp;display=swap" rel="stylesheet"/>
<style data-purpose="custom-animations">
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    @keyframes typing {
      from { width: 0; }
      to { width: 100%; }
    }

    @keyframes fadeSlideIn {
      from {
        opacity: 0;
        transform: translateY(5px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .cursor-blink {
      animation: blink 1s step-end infinite;
    }

    .log-line {
      display: none;
      animation: fadeSlideIn 0.4s ease-out forwards;
    }

    .log-line.active {
      display: flex;
    }

    /* Glassmorphism subtle glow */
    .terminal-glow {
      box-shadow: 0 0 20px rgba(34, 197, 94, 0.05);
    }
  </style>
<style data-purpose="typography">
    body {
      font-family: 'Fira Code', monospace;
      background-color: #050505;
    }
    .neon-text {
      color: #00ffaa;
      text-shadow: 0 0 8px rgba(0, 255, 170, 0.4);
    }
    .accent-cyan {
      color: #00d4ff;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
<!-- BEGIN: SystemActivitySection -->
<section class="w-full max-w-2xl mx-auto" data-purpose="live-activity-container">
<!-- BEGIN: TerminalPanel -->
<div class="relative bg-zinc-950/50 border border-zinc-800/50 rounded-lg overflow-hidden backdrop-blur-md terminal-glow">
<!-- BEGIN: TerminalHeader -->
<header class="flex items-center justify-between px-4 py-3 bg-zinc-900/30 border-b border-zinc-800/50">
<div class="flex space-x-2">
<div class="w-3 h-3 rounded-full bg-red-500/20 border border-red-500/40"></div>
<div class="w-3 h-3 rounded-full bg-amber-500/20 border border-amber-500/40"></div>
<div class="w-3 h-3 rounded-full bg-emerald-500/20 border border-emerald-500/40"></div>
</div>
<span class="text-[10px] uppercase tracking-[0.2em] text-zinc-500 font-medium">Live System Activity</span>
<div class="w-12"></div> <!-- Spacer for centering title -->
</header>
<!-- END: TerminalHeader -->
<!-- BEGIN: TerminalContent -->
<main class="p-6 min-h-[320px] flex flex-col justify-start space-y-3" id="log-container">
<!-- Activity Log Lines -->
<div class="log-line items-center space-x-3 text-sm" data-line="0">
<span class="neon-text">✓</span>
<span class="text-zinc-400">Automation workflow deployed</span>
<span class="text-zinc-600 text-xs ml-auto">now</span>
</div>
<div class="log-line items-center space-x-3 text-sm" data-line="1">
<span class="neon-text">✓</span>
<span class="text-zinc-400">CRM pipeline configured</span>
<span class="text-zinc-600 text-xs ml-auto">2s ago</span>
</div>
<div class="log-line items-center space-x-3 text-sm" data-line="2">
<span class="neon-text">✓</span>
<span class="text-zinc-400">Lead capture funnel activated</span>
<span class="text-zinc-600 text-xs ml-auto">5s ago</span>
</div>
<div class="log-line items-center space-x-3 text-sm" data-line="3">
<span class="neon-text">✓</span>
<span class="text-zinc-400">AI chatbot training completed</span>
<span class="text-zinc-600 text-xs ml-auto">12s ago</span>
</div>
<div class="log-line items-center space-x-3 text-sm" data-line="4">
<span class="accent-cyan">✓</span>
<span class="text-zinc-400">Funnel optimization running</span>
<span class="inline-block w-2 h-4 bg-emerald-500 cursor-blink ml-2"></span>
</div>
<div class="log-line items-center space-x-3 text-sm" data-line="5">
<span class="neon-text">✓</span>
<span class="text-zinc-400">Database integration connected</span>
<span class="text-zinc-600 text-xs ml-auto">ready</span>
</div>
</main>
<!-- END: TerminalContent -->
<!-- BEGIN: TerminalFooter -->
<footer class="px-6 py-3 border-t border-zinc-900/50 bg-black/20">
<div class="flex items-center text-[10px] text-zinc-600 uppercase tracking-widest">
<span class="flex h-2 w-2 rounded-full bg-emerald-500 mr-2 animate-pulse"></span>
          System Status: Operational
        </div>
</footer>
<!-- END: TerminalFooter -->
</div>
<!-- END: TerminalPanel -->
</section>
<!-- END: SystemActivitySection -->
<script data-purpose="log-sequencer">
    document.addEventListener('DOMContentLoaded', () => {
      const lines = document.querySelectorAll('.log-line');
      let currentIndex = 0;

      function showNextLine() {
        if (currentIndex < lines.length) {
          lines[currentIndex].classList.add('active');
          currentIndex++;
          
          // Random delay between lines to simulate real system behavior
          const nextDelay = Math.floor(Math.random() * 1200) + 600;
          setTimeout(showNextLine, nextDelay);
        } else {
          // Reset after a longer pause to loop the animation
          setTimeout(() => {
            lines.forEach(line => line.classList.remove('active'));
            currentIndex = 0;
            showNextLine();
          }, 4000);
        }
      }

      // Initial start
      setTimeout(showNextLine, 500);
    });
  </script>
</body></html>
