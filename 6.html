<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#00FFFF",
                        "background-light": "#f5f7f8",
                        "background-dark": "#000000",
                        "card-dark": "#111111",
                        "accent-gray": "#BFBFBF"
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1.5rem",
                        "full": "9999px"
                    },
                    animation: {
                        'float': 'float 4s ease-in-out infinite',
                        'gradient-slow': 'gradient 8s ease infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-15px)' },
                        },
                        gradient: {
                            '0%, 100%': { 'background-position': '0% 50%' },
                            '50%': { 'background-position': '100% 50%' },
                        }
                    }
                },
            },
        }
    </script>
<style>
        .gradient-bg {
            background: linear-gradient(-45deg, #111111, #1a1a1a, #111111, #222222);
            background-size: 400% 400%;
        }
        .btn-hover-arrow:hover span.arrow-icon {
            transform: translateX(5px);
        }
    </style>
</head>
<body class="bg-background-dark font-display text-slate-100 antialiased">
<div class="relative flex min-h-screen w-full flex-col items-center justify-center p-3 overflow-hidden">
<div class="absolute inset-0 z-0 opacity-20">
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-primary/10 rounded-full blur-[120px]"></div>
</div>
<div class="z-10 w-full max-w-[800px] mx-auto animate-float">
<div class="gradient-bg animate-gradient-slow p-[60px] rounded-2xl border border-primary/30 shadow-[0_0_40px_-15px_rgba(0,255,255,0.2)] flex flex-col items-center text-center gap-8">
<div class="space-y-4">
<h1 class="text-4xl md:text-5xl font-bold tracking-tight text-white leading-tight">
                        Ready to Build a <span class="text-primary">Smarter</span> Growth System?
                    </h1>
<p class="text-accent-gray text-lg md:text-xl max-w-2xl mx-auto font-light leading-relaxed">
                        Stop guessing. Let's build the technical foundation your business needs to scale predictably and efficiently.
                    </p>
</div>
<div class="mt-4">
<button class="btn-hover-arrow group relative flex items-center justify-center gap-2 overflow-hidden rounded-lg bg-primary px-8 py-4 text-background-dark font-semibold transition-all duration-300 hover:scale-[1.05] hover:shadow-[0_0_25px_rgba(0,255,255,0.4)]">
<span class="text-lg">Get Started</span>
<span class="arrow-icon material-symbols-outlined transition-transform duration-300">
                            arrow_forward
                        </span>
</button>
</div>
</div>
</div>
</div>
</body></html>
