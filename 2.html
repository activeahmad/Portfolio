<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Trusted by Founders &amp; Brands</title>
<!-- BEGIN: External Scripts -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- END: External Scripts -->
<!-- BEGIN: Custom Styling -->
<style data-purpose="animations-and-depth">
    @keyframes scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .carousel-track {
      display: flex;
      width: max-content;
      animation: scroll 40s linear infinite;
    }

    /* 3D Perspective Container */
    .perspective-container {
      perspective: 1200px;
      overflow: hidden;
    }

    /* Curvature Mask - Fades out edges to enhance 3D recede effect */
    .mask-gradient {
      mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
      -webkit-mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
    }

    /* Logo Item Styling with 3D effects */
    .logo-item {
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      filter: grayscale(1) brightness(2);
      transform: translateZ(0);
    }

    .logo-item:hover {
      transform: translateZ(100px) scale(1.2);
      filter: grayscale(0) brightness(1) drop-shadow(0 0 15px rgba(255, 255, 255, 0.6));
      z-index: 10;
    }

    /* Particle Canvas styling */
    #particle-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
  </style>
<!-- END: Custom Styling -->
</head>
<body class="bg-black text-white antialiased">
<!-- BEGIN: Brands Section -->
<section class="relative flex flex-col justify-center items-center py-12 overflow-hidden bg-black" data-purpose="trusted-brands-section">
<!-- BEGIN: Header Content -->
<div class="relative z-10 text-center mb-12 px-6">
<h2 class="text-4xl md:text-6xl font-bold tracking-tight mb-6">
        Trusted by Founders &amp; Brands
      </h2>
<p class="text-lg md:text-xl text-[#BFBFBF] max-w-2xl mx-auto font-light">
        Collaborating across creative, tech, and lifestyle industries to build the future of digital experiences.
      </p>
</div>
<!-- END: Header Content -->
<!-- BEGIN: 3D Brand Carousel -->
<div class="perspective-container w-full mask-gradient py-10" data-purpose="brand-carousel">
<div class="carousel-track flex items-center space-x-16 md:space-x-32 px-4"><!-- Original Set -->
<div class="flex items-center space-x-16 md:space-x-32">
<!-- Fiverr -->
<div class="logo-item flex items-center justify-center w-24 md:w-32 h-24"><span class="text-white font-black text-3xl md:text-5xl tracking-tighter">Fiverr</span></div>
<!-- Upwork -->
<div class="logo-item flex items-center justify-center w-24 md:w-32 h-24"><span class="text-white font-black text-3xl md:text-5xl tracking-tighter">Upwork</span></div>
<!-- Toptal -->
<div class="logo-item flex items-center justify-center w-24 md:w-32 h-24"><span class="text-white font-black text-3xl md:text-5xl tracking-tighter">Toptal</span></div>
<!-- GitHub -->
<div class="logo-item flex items-center justify-center w-24 md:w-32 h-24"><span class="text-white font-black text-3xl md:text-5xl tracking-tighter">GitHub</span></div>
<!-- Beehiiv -->
<div class="logo-item flex items-center justify-center w-24 md:w-32 h-24"><span class="text-white font-black text-3xl md:text-5xl tracking-tighter">Beehiiv</span></div>
</div>
<!-- Clone Set for Infinite Loop -->
<div class="flex items-center space-x-16 md:space-x-32">
<!-- Fiverr Clone -->
<div class="logo-item flex items-center justify-center w-24 md:w-32 h-24"><span class="text-white font-black text-3xl md:text-5xl tracking-tighter">Fiverr</span></div>
<!-- Upwork Clone -->
<div class="logo-item flex items-center justify-center w-24 md:w-32 h-24"><span class="text-white font-black text-3xl md:text-5xl tracking-tighter">Upwork</span></div>
<!-- Toptal Clone -->
<div class="logo-item flex items-center justify-center w-24 md:w-32 h-24"><span class="text-white font-black text-3xl md:text-5xl tracking-tighter">Toptal</span></div>
<!-- GitHub Clone -->
<div class="logo-item flex items-center justify-center w-24 md:w-32 h-24"><span class="text-white font-black text-3xl md:text-5xl tracking-tighter">GitHub</span></div>
<!-- Beehiiv Clone -->
<div class="logo-item flex items-center justify-center w-24 md:w-32 h-24"><span class="text-white font-black text-3xl md:text-5xl tracking-tighter">Beehiiv</span></div>
</div></div>
</div>
<!-- END: 3D Brand Carousel -->
</section>
<!-- END: Brands Section -->
<!-- BEGIN: Hover Effect Handler -->
<script data-purpose="carousel-interaction">
    // Optional: Pause animation on hover
    const track = document.querySelector('.carousel-track');
    track.addEventListener('mouseenter', () => {
      track.style.animationPlayState = 'paused';
    });
    track.addEventListener('mouseleave', () => {
      track.style.animationPlayState = 'running';
    });
  </script>
<!-- END: Hover Effect Handler -->
</body></html>
